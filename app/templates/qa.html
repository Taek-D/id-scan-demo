<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ID Scan QA 갤러리</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body class="app-shell admin-shell">
    <div class="ambient ambient-left"></div>
    <div class="ambient ambient-right"></div>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand-lockup">
          <p class="eyebrow">Internal QA</p>
          <strong>ID Scan QA Gallery</strong>
        </div>
        <nav class="topbar-actions" aria-label="주요 이동">
          <a class="button button-secondary button-quiet" href="/admin">관리자 화면</a>
          <a class="button button-secondary button-quiet" href="/">촬영 화면</a>
          <a class="button button-secondary button-quiet" href="{{ streamlit_url }}" target="_blank" rel="noreferrer">
            Streamlit
          </a>
        </nav>
      </div>
    </header>

    <main class="admin-page">
      <section class="hero-panel hero-panel-compact">
        <div>
          <p class="section-label">내부 품질 검증</p>
          <h1>샘플별 판정과 4단계 결과를 한 번에 비교합니다</h1>
          <p class="lead">
            기본 샘플 세트만 대상으로 현재 파이프라인과 품질 판정 결과를 즉시 계산해 보여주는 내부 QA 화면입니다.
          </p>
        </div>
        <div class="hero-actions">
          <button id="refresh-qa" class="button button-primary">QA 다시 계산</button>
        </div>
      </section>

      <section class="submission-board qa-board">
        <div id="qa-gallery" class="qa-grid"></div>
      </section>
    </main>

    <script src="/static/qa.js" defer></script>
  </body>
</html>
